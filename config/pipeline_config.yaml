# ==========================================================================
# Paediatric Simulation AI Feedback Pipeline — Configuration
# ==========================================================================
# This file is part of the freeze manifest. Any change requires a version
# bump and re-archival before confirmatory analyses.
# ==========================================================================

pipeline:
  version: "0.1.0-dev"
  seed: 42                        # Global random seed for reproducibility
  language: "de"                  # Primary language (German)

# --------------------------------------------------------------------------
# Paths
# --------------------------------------------------------------------------
paths:
  output_dir: "data/reports"
  processed_dir: "data/processed"
  scenario_catalog: "templates/scenario_catalog.json"
  clinical_modules_dir: "templates/clinical_modules"

# --------------------------------------------------------------------------
# Stage 1: Data Ingestion
# --------------------------------------------------------------------------
# Your setup: ONE composite 4-quadrant video per session
#   ┌────────────────┬──────────────────┐
#   │ Overhead cam   │ Patient monitor  │
#   │ (top-left)     │ (top-right)      │
#   ├────────────────┼──────────────────┤
#   │ Side camera    │ Parent eye-track │
#   │ (bottom-left)  │ (bottom-right)   │
#   └────────────────┴──────────────────┘
# Audio is embedded in the video (room mic).
# No separate physio or eye-tracking data files.

ingest:
  accepted_video_formats: [".mp4", ".avi", ".mkv", ".mov"]
  accepted_audio_formats: [".wav", ".mp3", ".flac", ".m4a"]
  min_duration_s: 30
  max_duration_s: 3600
  # Composite video layout
  composite_video:
    enabled: true
    layout: "2x2"                 # 4-quadrant grid
    # Which quadrant to run video analysis on (NVB / MediaPipe).
    # Recorded into inventory.json during ingestion so it's auditable.
    # Override per-session by adding "video_analysis_quadrant" to metadata.json.
    # Valid values: top_left | top_right | bottom_left | bottom_right
    video_analysis_quadrant: "bottom_right"   # side camera — clinician visible
    quadrants:
      top_left: "overhead_camera"
      top_right: "patient_monitor"
      bottom_left: "side_camera"
      bottom_right: "parent_eyetracking"
  # No separate physio/eyetracking files
  physio:
    enabled: false
  eyetracking:
    enabled: false

# --------------------------------------------------------------------------
# Stage 2: ASR (Whisper)
# --------------------------------------------------------------------------
asr:
  model_name: large-v3
  language: de
  batch_size: 8
  device: cuda
  suppress_numerals: false
  diarization:
    enabled: true
    repo_path: /home/malhaskir/projects/whisper-diarization
    no_stem: false   # set true to skip Demucs separation (faster but worse)

    # Set num_speakers to the exact expected count for best accuracy.
    # When set, min_speakers / max_speakers are ignored by pyannote.
    # For clinician + parent/guardian scenarios this is always 2.
    num_speakers: 2
    min_speakers: 2           # fallback if num_speakers is removed
    max_speakers: 2
    hf_token_env: "HF_TOKEN"
    # ECAPA-TDNN re-clustering after pyannote.
    # Disabled: notebook experiments showed both speakers occupy the same
    # region in ECAPA embedding space (room mic reverb, similar female voices).
    # K-means overrides pyannote with a worse split. Keep false unless
    # you have close-talk microphones or clearly different-gender speakers.
    ecapa_recluster: false
    # Optional pyannote internal hyperparameters.
    # Uncomment and tune if diarization is still poor after setting num_speakers.
    # segmentation.threshold: lower value → more segments detected (default ~0.5)exp
    # clustering.threshold:   lower value → stricter speaker separation (default ~0.7)
    # hyperparameters:
    #   segmentation:
    #     threshold: 0.4
    #   clustering:
    #     threshold: 0.65

  # LLM-based speaker relabeling: maps SPEAKER_XX → ARZT / BEGLEITUNG using
  # conversational context (who introduces themselves, who explains procedures).
  # Runs after diarization merge, reuses the top-level `llm` backend config.
  speaker_relabeling:
    enabled: true

# --------------------------------------------------------------------------
# Stage 3: Feature Extraction
# --------------------------------------------------------------------------
features:
  # Verbal / interaction features (from transcript)
  verbal:
    compute_turn_taking: true
    compute_pauses: true
    pause_threshold_s: 2.0
    compute_interruptions: true
  # Patient monitor OCR (extract vitals from top-right quadrant)
  monitor_ocr:
    enabled: true
    quadrant: "top_right"
  # No separate physio/eyetracking files — data is in the composite video
  physio:
    enabled: false
  eyetracking:
    enabled: false


video_analysis:
  enabled: true
  sample_fps: 10
  # Fallback quadrant if inventory.json does not specify one.
  # Rarely needed — prefer setting video_analysis_quadrant under ingest.composite_video.
  preferred_quadrant: "bottom_left"

# --------------------------------------------------------------------------
# Stage 4: LLM Analysis
# --------------------------------------------------------------------------
llm:
  # Model configuration — local inference via llama-cpp-python or vLLM
  backend: "llama_cpp"            # "llama_cpp" or "vllm"
  model_path: "/data/malhaskir/simdata/models/qwen2.5-32b-instruct-q8_0-00001-of-00009.gguf"
  #model_path: "/data/malhaskir/simdata/models/Qwen2.5-72B-Instruct-IQ4_XS.gguf"
  #model_path: "/data/malhaskir/simdata/models/Meta-Llama-3.1-70B-Instruct-IQ4_XS.gguf"
  enabled: true
  #model_path: "models/qwen2.5-32b-instruct-q8_0-00001-of-00009.gguf"  # Path to local model weights
  #model_path: "models/qwen2.5-32b-instruct-q8_0-00001-of-00009.gguf"  # Path to local model weights

  # For vLLM backend:
  # model_name: "meta-llama/Llama-3.1-8B-Instruct"
  context_length: 32768 # 35000 20000
  temperature: 0.0                # Deterministic output
  enforce_eager: true 
  top_p: 1.0
  seed: 42
  max_tokens: 10000

  # Assessment domains (mapped to LUCAS scale)
  domains:
    - name: "global_communication"
      description: "Overall communication quality including empathy, clarity, and rapport"
      scale:
        min: 1
        max: 5
        labels:
          1: "Inadequate"
          2: "Below expectations"
          3: "Meets expectations"
          4: "Above expectations"
          5: "Excellent"
      weight: 1.0                 # Primary endpoint domain

    - name: "conversation_structuring"
      description: "Organization of the consultation: opening, agenda, transitions, closing"
      scale:
        min: 1
        max: 5
        labels:
          1: "Inadequate"
          2: "Below expectations"
          3: "Meets expectations"
          4: "Above expectations"
          5: "Excellent"
      weight: 0.8

    - name: "clinical_content"
      description: "Medical accuracy, completeness of history, appropriate clinical reasoning"
      scale:
        min: 1
        max: 5
        labels:
          1: "Inadequate"
          2: "Below expectations"
          3: "Meets expectations"
          4: "Above expectations"
          5: "Excellent"
      weight: 0.8

  # Prompt template files (Jinja2) — tracked in freeze manifest
  spikes_template: "templates/spikes_prompt.j2"
  lucas_template: "templates/lucas_prompt.j2"
  clinical_content_template: "templates/clinical_content_prompt.j2"

# --------------------------------------------------------------------------
# Stage 5: Report Generation
# --------------------------------------------------------------------------
report:
  format: "json"                  # Primary output format
  additional_formats: ["pdf", "html"]
  template: "templates/report_template.html"
  # Blinding: generic labels only
  label_prefix: "REPORT"         # Reports labelled REPORT_001, REPORT_002, ...
  include_timestamps: true
  include_confidence: false       # Whether to include LLM confidence estimates

# --------------------------------------------------------------------------
# Evaluation (not part of generation pipeline, but tracked in manifest)
# --------------------------------------------------------------------------
evaluation:
  phase1:
    primary_metric: "quadratic_weighted_kappa"
    primary_domain: "global_communication"
    threshold: 0.80               # Lower bound of 97.5% CI
    alpha: 0.025
  phase2:
    primary_metric: "lucas_total_score"
    scale: [0, 100]
    noninferiority_margin: -15
    alpha: 0.025


stages:
  translate:
    enabled: true
    max_tokens: 10000
    min_length: 10
    fields_to_skip: []   # uses built-in skip list; add custom keys here if needed
    backend: "llama_cpp"            # "llama_cpp" or "vllm"
    model_path: "/data/malhaskir/simdata/models/qwen2.5-32b-instruct-q8_0-00001-of-00009.gguf"