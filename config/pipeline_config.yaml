# ==========================================================================
# Paediatric Simulation AI Feedback Pipeline — Configuration
# Part of the freeze manifest. Any change requires a version bump.
# See PIPELINE.md for full documentation.
# ==========================================================================

pipeline:
  version: "0.3.0"  # informational — runtime version is set in pipeline.py:PIPELINE_VERSION
  seed: 42

# --------------------------------------------------------------------------
paths:
  output_dir: "data/reports"
  scenario_catalog: "templates/scenario_catalog.json"

# --------------------------------------------------------------------------
# Stage 01: Data Ingestion
# --------------------------------------------------------------------------
ingest:
  accepted_video_formats: [".mp4", ".avi", ".mkv", ".mov"]
  min_duration_s: 30
  max_duration_s: 3600
  composite_video:
    enabled: true
    # Which quadrant MediaPipe runs on. Recorded in inventory.json (auditable).
    # Override per-session via metadata.json → "video_analysis_quadrant".
    # Values: top_left | top_right | bottom_left | bottom_right
    video_analysis_quadrant: "top_right"
    quadrants:
      top_left: "overhead_camera"
      top_right: "patient_monitor"
      bottom_left: "side_camera"
      bottom_right: "parent_eyetracking"

# --------------------------------------------------------------------------
# Stage 02: ASR & Speaker Diarization
# --------------------------------------------------------------------------
asr:
  model_name: large-v3
  language: de
  device: cuda
  compute_type: "float16"   # "int8" on CPU-only machines
  beam_size: 5
  suppress_numerals: false
  diarization:
    enabled: true
    repo_path: /home/malhaskir/projects/whisper-diarization
    no_stem: false          # true = skip Demucs source separation (faster, lower quality)
    num_speakers: 2         # exact count; when set, overrides min/max_speakers
    min_speakers: 2         # used only if num_speakers is removed
    max_speakers: 2
    # hf_token_env: HF_TOKEN must be set in environment for pyannote
    # Uncomment to tune pyannote internals if diarization quality is poor:
    # hyperparameters:
    #   segmentation:
    #     threshold: 0.4    # lower → more segments (default ~0.5)
    #   clustering:
    #     threshold: 0.65   # lower → stricter separation (default ~0.7)
  speaker_relabeling:
    enabled: true           # LLM maps SPEAKER_XX → ARZT / BEGLEITUNG after diarization

# --------------------------------------------------------------------------
# Stage 03: Feature Extraction
# --------------------------------------------------------------------------
features:
  verbal:
    pause_threshold_s: 2.0
    compute_interruptions: true
  monitor_ocr:
    enabled: false          # NOT YET IMPLEMENTED

# --------------------------------------------------------------------------
# Stage 04: Video Analysis (MediaPipe)
# --------------------------------------------------------------------------
video_analysis:
  enabled: true
  sample_fps: 10
  preferred_quadrant: "bottom_left"  # fallback if inventory.json has no quadrant set
  calibration_seconds: 120           # seconds used to compute person-relative baselines
  generate_annotated_video: true     # write annotated_video.mp4 to output dir
  annotated_codec: "mp4v"
  annotated_draw_landmarks: true
  # MediaPipe detection thresholds
  detection_confidence: 0.4
  tracking_confidence: 0.4
  dnn_confidence: 0.3
  # Face crop parameters
  face_crop_size: 320
  face_pad: 0.4
  upscale_factor: 1.0
  dnn_interval: 1
  num_workers: 40

# --------------------------------------------------------------------------
# Stage 05: LLM Analysis
# --------------------------------------------------------------------------
llm:
  backend: "llama_cpp"      # "llama_cpp" or "vllm"
  model_path: "/data/malhaskir/simdata/models/qwen2.5-32b-instruct-q8_0-00001-of-00009.gguf"
  context_length: 32768
  temperature: 0.0          # deterministic / greedy decoding
  top_p: 1.0
  seed: 42
  max_tokens: 10000
  repeat_penalty: 1.05
  n_gpu_layers: -1          # -1 = all layers on GPU

# --------------------------------------------------------------------------
# Stage 07: Report Generation
# --------------------------------------------------------------------------
report:
  additional_formats: ["pdf", "html"]
  template: "templates/report_template.html"
  label_prefix: "REPORT"   # blinded labels: REPORT_001, REPORT_002, ...
  include_timestamps: true
  include_spikes: true      # include SPIKES annotation section in report

